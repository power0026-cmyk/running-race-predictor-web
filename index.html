<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Running Race Predictor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>Running Race Predictor</h1>
      <p>웹 1단계 MVP</p>
    </header>

    <section class="card">
      <h2>기록 입력</h2>
      <div class="grid">
        <label>10K
          <input id="tenk" type="text" placeholder="0:48:50" />
        </label>
        <label>하프
          <input id="half" type="text" placeholder="1:51:13" />
        </label>
        <label>풀
          <input id="full" type="text" placeholder="3:56:50" />
        </label>
      </div>
    </section>

    <section class="card">
      <h2>목표 대회</h2>
      <select id="raceMode">
        <option value="10K">10K</option>
        <option value="half">하프</option>
        <option value="full">풀</option>
      </select>
      <button id="calcBtn">예상 기록 계산</button>
    </section>

    <section class="card result">
      <h2>결과</h2>
      <div id="resultTime">-</div>
      <div id="resultPace">-</div>
      <div id="resultNote">기록을 입력하고 계산해줘</div>
    </section>

    <section class="card">
      <h2>페이스 계산기</h2>
      <label>거리(km)
        <input id="dist" type="number" step="0.01" value="10" />
      </label>
      <label>목표 시간
        <input id="targetTime" type="text" placeholder="0:50:00" />
      </label>
      <button id="paceBtn">평균 페이스 계산</button>
      <div id="paceResult">-</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<input id="targetTime" ...>

<div id="paceResult">
